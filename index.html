<style>
  :root {
    --bg-main: #f8f9fa;
    --card-bg: #ffffff;
    --text-main: #212529;
    --text-muted: #6c757d;
    --accent-wax: #8c2f1b;
    --accent-gold: #c5a059;
    --color-correct: #2e7d32;
    --color-correct-bg: #e8f5e9;
    --color-wrong: #c62828;
    --color-wrong-bg: #ffebee;
    --border-radius: 12px;
    --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    margin: 0;
    background-color: var(--bg-main);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text-main);
  }

  .quiz-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 16px 16px 40px;
  }

  .quiz-card {
    width: 100%;
    max-width: 540px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .quiz-header {
    text-align: center;
    padding: 12px 0 4px;
  }

  .quiz-eyebrow {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--accent-wax);
    font-weight: 700;
    margin-bottom: 6px;
  }

  .quiz-title {
    font-size: 24px;
    font-weight: 800;
    line-height: 1.2;
    color: var(--text-main);
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }

  .quiz-sub {
    font-size: 14px;
    color: var(--text-muted);
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card-bg);
    padding: 12px 16px;
    border-radius: var(--border-radius);
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }

  .progress-track {
    flex: 1;
    height: 8px;
    background: #e9ecef;
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-gold), var(--accent-wax));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .progress-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-main);
    font-variant-numeric: tabular-nums;
  }

  .question-box {
    background: var(--card-bg);
    border-radius: var(--border-radius);
    padding: 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    border: 1px solid rgba(0,0,0,0.03);
  }

  .q-number {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent-gold);
    font-weight: 700;
    margin-bottom: 12px;
  }

  .q-text {
    font-size: 18px;
    line-height: 1.45;
    margin: 0 0 24px;
    font-weight: 700;
    color: var(--text-main);
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option-btn {
    text-align: left;
    font-family: inherit;
    font-size: 15px;
    line-height: 1.4;
    font-weight: 500;
    padding: 16px;
    border-radius: var(--border-radius);
    border: 2px solid #e9ecef;
    background: var(--card-bg);
    color: var(--text-main);
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    gap: 14px;
    align-items: flex-start;
    width: 100%;
  }

  @media (hover: hover) {
    .option-btn:hover:not(:disabled) {
      border-color: var(--accent-gold);
      background: #fffdf9;
      transform: translateY(-1px);
    }
  }

  .option-btn:active:not(:disabled) {
    transform: translateY(1px);
  }

  .option-letter {
    font-weight: 700;
    color: var(--text-muted);
    background: #f1f3f5;
    width: 24px;
    height: 24px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }

  .option-btn.correct {
    background: var(--color-correct-bg) !important;
    border-color: var(--color-correct) !important;
    color: var(--color-correct);
    font-weight: 600;
  }
  .option-btn.correct .option-letter {
    background: var(--color-correct);
    color: #fff;
  }

  .option-btn.wrong {
    background: var(--color-wrong-bg) !important;
    border-color: var(--color-wrong) !important;
    color: var(--color-wrong);
  }
  .option-btn.wrong .option-letter {
    background: var(--color-wrong);
    color: #fff;
  }

  .option-btn.dim {
    opacity: 0.4;
    transform: none !important;
  }

  .feedback-row {
    margin-top: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    min-height: 48px;
    border-top: 1px solid #f1f3f5;
    padding-top: 16px;
  }

  .feedback-msg {
    font-weight: 700;
    font-size: 16px;
  }
  .feedback-msg.good { color: var(--color-correct); }
  .feedback-msg.bad { color: var(--color-wrong); }

  .next-btn, .restart-btn {
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    padding: 12px 24px;
    background: var(--accent-wax);
    color: #ffffff;
    border: none;
    border-radius: var(--border-radius);
    cursor: pointer;
    transition: var(--transition);
    box-shadow: 0 4px 12px rgba(140,47,27,0.2);
    white-space: nowrap;
  }

  .next-btn:hover, .restart-btn:hover {
    background: #732514;
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(140,47,27,0.3);
  }

  .result-box {
    background: var(--card-bg);
    border-radius: var(--border-radius);
    padding: 32px 24px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    border: 1px solid rgba(0,0,0,0.03);
  }

  .result-score {
    font-size: 64px;
    font-weight: 800;
    color: var(--accent-wax);
    line-height: 1;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }

  .result-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 16px;
  }

  .result-verdict {
    font-size: 16px;
    line-height: 1.5;
    color: var(--text-main);
    margin-bottom: 32px;
    font-weight: 500;
  }

  .review-list {
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 32px;
  }

  .review-item {
    font-size: 14px;
    line-height: 1.45;
    padding: 16px;
    border-radius: var(--border-radius);
    border: 1px solid transparent;
  }
  
  .review-item.miss {
    background: var(--color-wrong-bg);
    border-color: rgba(198,40,40,0.15);
  }
  
  .review-item.hit {
    background: var(--color-correct-bg);
    border-color: rgba(46,125,50,0.15);
    text-align: center;
    font-weight: 600;
    color: var(--color-correct);
  }

  .review-q {
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--text-main);
  }

  .review-meta {
    font-size: 13px;
    color: #555;
  }

  .restart-btn {
    width: 100%;
    padding: 16px;
    font-size: 16px;
  }

  .footer-note {
    margin-top: 8px;
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
  }

  @media (max-width: 480px) {
    .quiz-title { font-size: 22px; }
    .question-box { padding: 20px; }
    .q-text { font-size: 17px; }
    .option-btn { padding: 14px; font-size: 14px; }
  }
</style>

<div class="quiz-wrap">
  <div class="quiz-card" id="app"></div>
</div>

<script>
const QUESTIONS = [
{q:"Împăratul Henric al IV-lea a fost lăsat desculț, în sac și cenușă, timp de trei zile, în fața papei:", opts:["Papa Leon al IX-lea","Papa Inocențiu al III-lea","Papa Grigore al VII-lea"], correct:2},
{q:"Regele care a participat la două cruciade a fost:", opts:["Ludovic al IX-lea al Franței","Napoleon","Henric al IV-lea al Germaniei"], correct:0},
{q:"Imperiul latin de Răsărit a dăinuit între anii:", opts:["1204-1261","1431-1449","1324-1377"], correct:0},
{q:"Cea de-a patra cruciadă a avut ca rezultat:", opts:["Cucerirea Ierusalimului","Cucerirea Cartaginei","Cucerirea Constantinopolului"], correct:2},
{q:"Desființarea ordinului cavalerilor templieri a fost inițiată de:", opts:["Împăratul Carol al V-lea","Regele Franței Filip al IV-lea","Regele Angliei Ioan fără de Țară"], correct:1},
{q:"Ordinul monahal pentru femei similar cu cel franciscan s-a numit:", opts:["Ordinul cluniac","Săracele Clare","Ordinul ursulinelor"], correct:1},
{q:"Captivitatea Babiloniană a papalității a avut loc între anii:", opts:["1324-1362; 1364-1368","1309-1367; 1370-1377","1305-1360; 1367-1371"], correct:1},
{q:"Conciliul de la Pisa a avut loc în anul:", opts:["1414","1409","1416"], correct:1},
{q:"Jan Hus a fost ars pe rug în anul:", opts:["1431","1414","1415"], correct:2},
{q:"Constantinopolul a fost cucerit di turci în anul:", opts:["1484","1204","1453"], correct:2},
{q:"Promotorul principal al isihasmului a fost:", opts:["Kiril Lukaris","Varlaam de Calabria","Grigore Palama"], correct:2},
{q:"Martin Luther a afișat pe ușa Bisericii Castelului din Wittenberg cele 95 de teze pe data de:", opts:["3 ianuarie 1521","10 iunie 1520","31 octombrie 1517"], correct:2},
{q:"Martin Luther a fost excomunicat în anul:", opts:["1519","1521","1525"], correct:1},
{q:"Pentru protecție reciprocă, principii protestanți au format:", opts:["Liga de la Schmalkalden","Liga teutonică","Liga de la Wittenberg"], correct:0},
{q:"Orașul reformei lui Huldreich Zwingli a fost:", opts:["Zurich","Basel","Constanța"], correct:0},
{q:"Reprezentantul principal al mișcării anabaptiste din Țările de Jos a fost:", opts:["Theodore Beza","Menno Simons","Philip Schwarzerd Melanchthon"], correct:1},
{q:"Succesorul reformator al lui Calvin la Geneva a fost:", opts:["Theodore Beza","Johannes Eck","Johann Heinrich Bullinger"], correct:0},
{q:"Adepții lui Iacobus Arminius și-au publicat ideile în scrierea numită:", opts:["Defensor pacis (Apărătorul păcii)","Protestatio (Mărturisire)","Remonstratio (Protest)"], correct:2},
{q:"Cel mai important rol în acțiunile de contrareformă l-a avut ordinul monahal:", opts:["Ioanit","Iezuit","Franciscan"], correct:1},
{q:"Războiul de 30 de ani s-a încheiat prin:", opts:["Pacea de la Westfalia","Pacea de la Augsburg","Pacea de la Geneva"], correct:0},
{q:"Inițiatorul pietismului german a fost:", opts:["Philip Iacob Spener","Nicolas Storch","Philip Schwarzerd Melanchthon"], correct:0},
{q:"Fondatorul metodismului a fost:", opts:["Jan Hus","John Wesley","George Whitefield"], correct:1},
{q:"Patriarhul Constantinopolului care a simpatizat cu protestantismul a fost:", opts:["Kiril Kontaris","Khiril Lukaris","Ignatie al III-lea"], correct:1},
{q:"Data la care se consideră că a luat naștere mișcarea penticostală modernă este:", opts:["3 aprilie 1960","1 ianuarie 1901","7 noiembrie 1907"], correct:1},
{q:"William Joseph Seymour este cunoscut pentru trezirea spirituală de pe strada:", opts:["Renașterii","Azussa","Milton"], correct:1}
];

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

let order = shuffle(QUESTIONS.map((_,i)=>i));
let current = 0;
let score = 0;
let answered = false;
let selectedIdx = null;
let missedItems = [];

const letters = ['A','B','C'];
const app = document.getElementById('app');

function render(){
  if(current >= order.length){
    renderResult();
    return;
  }
  const qIdx = order[current];
  const q = QUESTIONS[qIdx];
  const pct = Math.round((current/order.length)*100);

  app.innerHTML = `
    <div class="quiz-header">
      <div class="quiz-eyebrow">Examen IBU II · Recapitulare</div>
      <div class="quiz-title">Reforma, Contrareforma și Trezirile Spirituale</div>
      <div class="quiz-sub">25 de întrebări din materia de examen</div>
    </div>
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${current+1} / ${order.length}</div>
    </div>
    <div class="question-box">
      <div class="q-number">Întrebarea ${current+1}</div>
      <p class="q-text">${q.q}</p>
      <div class="options" id="options"></div>
      <div class="feedback-row" id="feedback-row"></div>
    </div>
  `;

  const optsWrap = document.getElementById('options');
  q.opts.forEach((opt, i)=>{
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    optsWrap.appendChild(btn);
  });
}

function selectAnswer(i){
  if(answered) return;
  answered = true;
  selectedIdx = i;
  const qIdx = order[current];
  const q = QUESTIONS[qIdx];
  const correct = i === q.correct;
  if(correct) score++;
  else missedItems.push({q: q.q, yours: q.opts[i], right: q.opts[q.correct]});

  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach((b, idx)=>{
    b.disabled = true;
    if(idx === q.correct) b.classList.add('correct');
    else if(idx === i) b.classList.add('wrong');
    else b.classList.add('dim');
  });

  const row = document.getElementById('feedback-row');
  row.innerHTML = `
    <span class="feedback-msg ${correct ? 'good':'bad'}">${correct ? '✓ Corect!' : '✕ Greșit.'}</span>
    <button class="next-btn" id="next-btn">${current+1 < order.length ? 'Următoarea →' : 'Vezi rezultatul →'}</button>
  `;
  document.getElementById('next-btn').onclick = () => {
    current++;
    answered = false;
    selectedIdx = null;
    render();
  };
}

function renderResult(){
  const pct = Math.round((score/order.length)*100);
  let verdict;
  if(pct === 100) verdict = "Perfect — ești gata pentru examen.";
  else if(pct >= 80) verdict = "Foarte bine — mai repetă puțin punctele slabe.";
  else if(pct >= 60) verdict = "Un început bun, dar mai ai de recapitulat.";
  else verdict = "Merită o rundă în plus de recapitulare.";

  let reviewHtml = '';
  if(missedItems.length){
    reviewHtml = '<div class="review-list">' + missedItems.map(m => `
      <div class="review-item miss">
        <div class="review-q">${m.q}</div>
        <div class="review-meta">Ai ales: <span style="color:var(--color-wrong); font-weight:600">${m.yours}</span> · Corect: <span style="color:var(--color-correct); font-weight:600">${m.right}</span></div>
      </div>
    `).join('') + '</div>';
  } else {
    reviewHtml = '<div class="review-list"><div class="review-item hit">Ai răspuns corect la toate întrebările! 🎉</div></div>';
  }

  app.innerHTML = `
    <div class="quiz-header">
      <div class="quiz-eyebrow">Examen IBU II · Rezultat</div>
      <div class="quiz-title">Reforma, Contrareforma și Trezirile Spirituale</div>
    </div>
    <div class="result-box">
      <div class="result-score">${score}/${order.length}</div>
      <div class="result-label">${pct}% răspunsuri corecte</div>
      <div class="result-verdict">${verdict}</div>
      ${reviewHtml}
      <button class="restart-btn" id="restart-btn">Reia testul</button>
      <div class="footer-note">Întrebările sunt amestecate la fiecare încercare.</div>
    </div>
  `;
  document.getElementById('restart-btn').onclick = () => {
    order = shuffle(QUESTIONS.map((_,i)=>i));
    current = 0;
    score = 0;
    answered = false;
    selectedIdx = null;
    missedItems = [];
    render();
  };
}

render();
</script>
