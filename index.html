<style>
  :root{
    --parchment:#EFE6D3;
    --parchment-dark:#E3D6BA;
    --ink:#2B2620;
    --ink-soft:#5A4F41;
    --wax:#8C2F1B;
    --wax-dark:#6E2313;
    --gold:#A8823A;
    --good:#3E5C3A;
    --good-bg:#DCE6D6;
    --bad-bg:#F0D8CF;
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  .quiz-wrap{
    font-family:'Iowan Old Style','Palatino Linotype',Georgia,serif;
    background:var(--parchment);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(168,130,58,0.08) 0%, transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(140,47,27,0.06) 0%, transparent 45%);
    color:var(--ink);
    min-height:100%;
    padding:32px 20px 48px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .quiz-card{
    width:100%;
    max-width:640px;
  }
  .quiz-header{
    text-align:center;
    margin-bottom:24px;
    border-bottom:2px solid var(--gold);
    padding-bottom:16px;
  }
  .quiz-eyebrow{
    font-family:'Trebuchet MS',sans-serif;
    letter-spacing:0.18em;
    text-transform:uppercase;
    font-size:11px;
    color:var(--wax);
    font-weight:700;
  }
  .quiz-title{
    font-size:30px;
    margin:6px 0 4px;
    font-weight:600;
    letter-spacing:0.01em;
  }
  .quiz-sub{
    font-family:'Trebuchet MS',sans-serif;
    font-size:13px;
    color:var(--ink-soft);
  }
  .progress-row{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:22px;
    font-family:'Trebuchet MS',sans-serif;
  }
  .progress-track{
    flex:1;
    height:6px;
    background:var(--parchment-dark);
    border-radius:3px;
    overflow:hidden;
    border:1px solid rgba(43,38,32,0.15);
  }
  .progress-fill{
    height:100%;
    background:var(--wax);
    transition:width 0.35s ease;
  }
  .progress-label{
    font-size:12px;
    color:var(--ink-soft);
    white-space:nowrap;
    font-weight:600;
  }
  .question-box{
    background:#fff8ea;
    border:1px solid rgba(43,38,32,0.18);
    border-radius:2px;
    padding:28px 26px;
    box-shadow:0 2px 0 rgba(43,38,32,0.06), 0 8px 24px rgba(43,38,32,0.06);
    position:relative;
  }
  .question-box::before{
    content:'';
    position:absolute;
    top:0;left:0;right:0;
    height:3px;
    background:linear-gradient(90deg, var(--wax), var(--gold));
  }
  .q-number{
    font-family:'Trebuchet MS',sans-serif;
    font-size:12px;
    letter-spacing:0.1em;
    color:var(--gold);
    font-weight:700;
    text-transform:uppercase;
    margin-bottom:8px;
  }
  .q-text{
    font-size:20px;
    line-height:1.4;
    margin:0 0 22px;
    font-weight:600;
  }
  .options{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .option-btn{
    text-align:left;
    font-family:'Trebuchet MS',sans-serif;
    font-size:15px;
    padding:13px 16px;
    border-radius:2px;
    border:1.5px solid rgba(43,38,32,0.25);
    background:var(--parchment);
    color:var(--ink);
    cursor:pointer;
    transition:border-color 0.15s ease, background 0.15s ease, transform 0.08s ease;
    display:flex;
    gap:12px;
    align-items:baseline;
  }
  .option-btn:hover:not(:disabled){
    border-color:var(--wax);
    background:var(--parchment-dark);
  }
  .option-btn:active:not(:disabled){
    transform:scale(0.995);
  }
  .option-letter{
    font-weight:700;
    color:var(--wax);
    min-width:16px;
  }
  .option-btn:disabled{
    cursor:default;
  }
  .option-btn.correct{
    background:var(--good-bg);
    border-color:var(--good);
  }
  .option-btn.correct .option-letter{color:var(--good);}
  .option-btn.wrong{
    background:var(--bad-bg);
    border-color:var(--wax-dark);
  }
  .option-btn.wrong .option-letter{color:var(--wax-dark);}
  .option-btn.dim{
    opacity:0.55;
  }
  .feedback-row{
    margin-top:18px;
    font-family:'Trebuchet MS',sans-serif;
    font-size:14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    min-height:32px;
  }
  .feedback-msg{
    font-weight:700;
  }
  .feedback-msg.good{color:var(--good);}
  .feedback-msg.bad{color:var(--wax-dark);}
  .next-btn{
    font-family:'Trebuchet MS',sans-serif;
    font-size:14px;
    font-weight:700;
    padding:9px 18px;
    background:var(--wax);
    color:#fdf6e8;
    border:none;
    border-radius:2px;
    cursor:pointer;
    letter-spacing:0.02em;
  }
  .next-btn:hover{background:var(--wax-dark);}

  .result-box{
    background:#fff8ea;
    border:1px solid rgba(43,38,32,0.18);
    border-radius:2px;
    padding:36px 30px;
    text-align:center;
    box-shadow:0 2px 0 rgba(43,38,32,0.06), 0 8px 24px rgba(43,38,32,0.06);
    position:relative;
  }
  .result-box::before{
    content:'';
    position:absolute;
    top:0;left:0;right:0;
    height:3px;
    background:linear-gradient(90deg, var(--wax), var(--gold));
  }
  .result-score{
    font-size:56px;
    font-weight:700;
    color:var(--wax);
    line-height:1;
    margin-bottom:6px;
  }
  .result-label{
    font-family:'Trebuchet MS',sans-serif;
    font-size:14px;
    color:var(--ink-soft);
    margin-bottom:22px;
  }
  .result-verdict{
    font-size:19px;
    margin-bottom:26px;
  }
  .review-list{
    text-align:left;
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:26px;
  }
  .review-item{
    font-family:'Trebuchet MS',sans-serif;
    font-size:13px;
    padding:10px 14px;
    border-radius:2px;
    border:1px solid rgba(43,38,32,0.15);
  }
  .review-item.miss{background:var(--bad-bg);}
  .review-item.hit{background:var(--good-bg);}
  .review-q{font-weight:700; margin-bottom:2px;}
  .restart-btn{
    font-family:'Trebuchet MS',sans-serif;
    font-size:15px;
    font-weight:700;
    padding:12px 26px;
    background:var(--wax);
    color:#fdf6e8;
    border:none;
    border-radius:2px;
    cursor:pointer;
  }
  .restart-btn:hover{background:var(--wax-dark);}
  .footer-note{
    margin-top:20px;
    text-align:center;
    font-family:'Trebuchet MS',sans-serif;
    font-size:12px;
    color:var(--ink-soft);
  }
  @media (max-width:480px){
    .q-text{font-size:18px;}
    .result-score{font-size:44px;}
  }
</style>

<div class="quiz-wrap">
  <div class="quiz-card" id="app"></div>
</div>

<script>
const QUESTIONS = [
{q:"Împăratul Henric al IV-lea a fost lăsat desculț, în sac și cenușă, timp de trei zile, în fața papei:", opts:["Papa Leon al IX-lea","Papa Inocențiu al III-lea","Papa Grigore al VII-lea"], correct:2},
{q:"Regele care a participat la două cruciade a fost:", opts:["Ludovic al IX-lea al Franței","Napoleon","Henric al IV-lea al Germaniei"], correct:0},
{q:"Imperiul latin de Răsărit a dăinuit între anii:", opts:["1204-1261","1431-1449","1324-1377"], correct:0},
{q:"Cea de-a patra cruciadă a avut ca rezultat:", opts:["Cucerirea Ierusalimului","Cucerirea Cartaginei","Cucerirea Constantinopolului"], correct:2},
{q:"Desființarea ordinului cavalerilor templieri a fost inițiată de:", opts:["Împăratul Carol al V-lea","Regele Franței Filip al IV-lea","Regele Angliei Ioan fără de Țară"], correct:1},
{q:"Ordinul monahal pentru femei similar cu cel franciscan s-a numit:", opts:["Ordinul cluniac","Săracele Clare","Ordinul ursulinelor"], correct:1},
{q:"Captivitatea Babiloniană a papalității a avut loc între anii:", opts:["1324-1362; 1364-1368","1309-1367; 1370-1377","1305-1360; 1367-1371"], correct:1},
{q:"Conciliul de la Pisa a avut loc în anul:", opts:["1414","1409","1416"], correct:1},
{q:"Jan Hus a fost ars pe rug în anul:", opts:["1431","1414","1415"], correct:2},
{q:"Constantinopolul a fost cucerit de turci în anul:", opts:["1484","1204","1453"], correct:2},
{q:"Promotorul principal al isihasmului a fost:", opts:["Kiril Lukaris","Varlaam de Calabria","Grigore Palama"], correct:2},
{q:"Martin Luther a afișat pe ușa Bisericii Castelului din Wittenberg cele 95 de teze pe data de:", opts:["3 ianuarie 1521","10 iunie 1520","31 octombrie 1517"], correct:2},
{q:"Martin Luther a fost excomunicat în anul:", opts:["1519","1521","1525"], correct:1},
{q:"Pentru protecție reciprocă, principii protestanți au format:", opts:["Liga de la Schmalkalden","Liga teutonică","Liga de la Wittenberg"], correct:0},
{q:"Orașul reformei lui Huldreich Zwingli a fost:", opts:["Zurich","Basel","Constanța"], correct:0},
{q:"Reprezentantul principal al mișcării anabaptiste din Țările de Jos a fost:", opts:["Theodore Beza","Menno Simons","Philip Schwarzerd Melanchthon"], correct:1},
{q:"Succesorul reformator al lui Calvin la Geneva a fost:", opts:["Theodore Beza","Johannes Eck","Johann Heinrich Bullinger"], correct:0},
{q:"Adepții lui Iacobus Arminius și-au publicat ideile în scrierea numită:", opts:["Defensor pacis (Apărătorul păcii)","Protestatio (Mărturisire)","Remonstratio (Protest)"], correct:2},
{q:"Cel mai important rol în acțiunile de contrareformă l-a avut ordinul monahal:", opts:["Ioanit","Iezuit","Franciscan"], correct:1},
{q:"Războiul de 30 de ani s-a încheiat prin:", opts:["Pacea de la Westfalia","Pacea de la Augsburg","Pacea de la Geneva"], correct:0},
{q:"Inițiatorul pietismului german a fost:", opts:["Philip Iacob Spener","Nicolas Storch","Philip Schwarzerd Melanchthon"], correct:0},
{q:"Fondatorul metodismului a fost:", opts:["Jan Hus","John Wesley","George Whitefield"], correct:1},
{q:"Patriarhul Constantinopolului care a simpatizat cu protestantismul a fost:", opts:["Kiril Kontaris","Khiril Lukaris","Ignatie al III-lea"], correct:1},
{q:"Data la care se consideră că a luat naștere mișcarea penticostală modernă este:", opts:["3 aprilie 1960","1 ianuarie 1901","7 noiembrie 1907"], correct:1},
{q:"William Joseph Seymour este cunoscut pentru trezirea spirituală de pe strada:", opts:["Renașterii","Azussa","Milton"], correct:1}
];

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

let order = shuffle(QUESTIONS.map((_,i)=>i));
let current = 0;
let score = 0;
let answered = false;
let selectedIdx = null;
let missedItems = [];

const letters = ['A','B','C'];
const app = document.getElementById('app');

function render(){
  if(current >= order.length){
    renderResult();
    return;
  }
  const qIdx = order[current];
  const q = QUESTIONS[qIdx];
  const pct = Math.round((current/order.length)*100);

  app.innerHTML = `
    <div class="quiz-header">
      <div class="quiz-eyebrow">Examen IBU II · Recapitulare</div>
      <div class="quiz-title">Reforma, Contrareforma și Trezirile Spirituale</div>
      <div class="quiz-sub">25 de întrebări din materia de examen</div>
    </div>
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${current+1} / ${order.length}</div>
    </div>
    <div class="question-box">
      <div class="q-number">Întrebarea ${current+1}</div>
      <p class="q-text">${q.q}</p>
      <div class="options" id="options"></div>
      <div class="feedback-row" id="feedback-row"></div>
    </div>
  `;

  const optsWrap = document.getElementById('options');
  q.opts.forEach((opt, i)=>{
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    optsWrap.appendChild(btn);
  });
}

function selectAnswer(i){
  if(answered) return;
  answered = true;
  selectedIdx = i;
  const qIdx = order[current];
  const q = QUESTIONS[qIdx];
  const correct = i === q.correct;
  if(correct) score++;
  else missedItems.push({q: q.q, yours: q.opts[i], right: q.opts[q.correct]});

  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach((b, idx)=>{
    b.disabled = true;
    if(idx === q.correct) b.classList.add('correct');
    else if(idx === i) b.classList.add('wrong');
    else b.classList.add('dim');
  });

  const row = document.getElementById('feedback-row');
  row.innerHTML = `
    <span class="feedback-msg ${correct ? 'good':'bad'}">${correct ? 'Corect!' : 'Greșit.'}</span>
    <button class="next-btn" id="next-btn">${current+1 < order.length ? 'Următoarea →' : 'Vezi rezultatul →'}</button>
  `;
  document.getElementById('next-btn').onclick = () => {
    current++;
    answered = false;
    selectedIdx = null;
    render();
  };
}

function renderResult(){
  const pct = Math.round((score/order.length)*100);
  let verdict;
  if(pct === 100) verdict = "Perfect — ești gata pentru examen.";
  else if(pct >= 80) verdict = "Foarte bine — mai repetă puțin punctele slabe.";
  else if(pct >= 60) verdict = "Un început bun, dar mai ai de recapitulat.";
  else verdict = "Merită o rundă în plus de recapitulare.";

  let reviewHtml = '';
  if(missedItems.length){
    reviewHtml = '<div class="review-list">' + missedItems.map(m => `
      <div class="review-item miss">
        <div class="review-q">${m.q}</div>
        <div>Ai ales: <strong>${m.yours}</strong> · Corect: <strong>${m.right}</strong></div>
      </div>
    `).join('') + '</div>';
  } else {
    reviewHtml = '<div class="review-list"><div class="review-item hit">Ai răspuns corect la toate întrebările!</div></div>';
  }

  app.innerHTML = `
    <div class="quiz-header">
      <div class="quiz-eyebrow">Examen IBU II · Rezultat</div>
      <div class="quiz-title">Reforma, Contrareforma și Trezirile Spirituale</div>
    </div>
    <div class="result-box">
      <div class="result-score">${score}/${order.length}</div>
      <div class="result-label">${pct}% răspunsuri corecte</div>
      <div class="result-verdict">${verdict}</div>
      ${reviewHtml}
      <button class="restart-btn" id="restart-btn">Reia testul</button>
    </div>
    <div class="footer-note">Întrebările sunt amestecate la fiecare încercare.</div>
  `;
  document.getElementById('restart-btn').onclick = () => {
    order = shuffle(QUESTIONS.map((_,i)=>i));
    current = 0;
    score = 0;
    answered = false;
    selectedIdx = null;
    missedItems = [];
    render();
  };
}

render();
</script>
